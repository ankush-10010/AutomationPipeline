# ============================================================================
# Show Configuration — Add one entry per show you cover
# ============================================================================
# Replace "rick_and_morty" with your actual first show.
# This file drives topic mining prompts, script tone, and clip matching.

shows:
  ben10:
    display_name: "Ben 10"
    active: true

    # -- Characters (used for clip matching + script prompts) --
    characters:
      - name: "Ben Tennyson"
        aliases: [
          "Ben", "Heatblast", "Wildmutt", "Diamondhead", "XLR8", "Grey Matter", "Four Arms", "Stinkfly", "Ripjaws", "Upgrade", "Ghostfreak",
          "Cannonbolt", "Wildvine", "Upchuck", "Ditto", "Eye Guy", "Way Big", "Spitter", "Buzzshock", "Arctiguana", "Eon", "Blitzwolfer", "Snare-oh", "Frankenstrike",
          "Swampfire", "Echo Echo", "Humungousaur", "Jetray", "Chromastone", "Brainstorm", "Spidermonkey", "Big Chill", "Goop", "Alien X", "Rath", "Nanomech", "Lodestar",
          "Water Hazard", "Terraspin", "NRG", "Ampfibian", "Armodrillo", "Clockwork", "Fasttrack", "Chamalien", "Jury Rigg", "Eatle",
          "Ultimate Swampfire", "Ultimate Echo Echo", "Ultimate Humungousaur", "Ultimate Spidermonkey", "Ultimate Big Chill", "Ultimate Wildmutt", "Ultimate Cannonbolt", "Ultimate Way Big"
        ]
        description: "The wielder of the Omnitrix, heroic but immature teenager."
        visual: "white shirt with black stripe, green jacket, omnitrix on wrist"
      - name: "Gwen Tennyson"
        aliases: ["Gwen", "Lucky Girl"]
        description: "Ben's intelligent, magic-wielding cousin."
        visual: "orange hair, blue shirt with cat logo"
      - name: "Max Tennyson"
        aliases: ["Max", "Grandpa Max", "Magister"]
        description: "Retired Plumber, wise grandfather."
        visual: "old man, red hawaiian shirt"
      - name: "Kevin Levin"
        aliases: ["Kevin", "Kevin 11"]
        description: "Reformed rogue, absorbs matter."
        visual: "black shirt, dark hair, teenager"
      - name: "Vilgax"
        aliases: ["Vilgax", "Vilgex"]
        description: "The conqueror of 10 worlds, seeks the Omnitrix."
        visual: "squid face, cyborg, giant"

    # -- Locations (used for clip matching) ----------------------------------
    locations:
      - "bellwood"
      - "rust bucket"
      - "null void"
      - "plumber base"
      - "plumber hq"
      - "mr. smoothy"
      - "forest"
      - "campground"
      - "spaceship"
      - "alien planet"
      - "school"
      - "garage"
      - "los soledad"
      - "undertown"
      - "mount rushmore"
      - "desert"
      - "cave"

    # -- Themes & keywords (used for topic mining + clip matching) -----------
    themes:
      - "omnitrix"
      - "alien transformation"
      - "hero responsibility"
      - "family road trip"
      - "teamwork"
      - "alien species"
      - "power and responsibility"
      - "growing up"
      - "identity"
      - "plumbers"
      - "vilgax"
      - "forever knights"
      - "DNAliens"
      - "highbreed invasion"

    # -- Prompt tuning (adjusts tone for this show's content) ----------------
    prompt_tuning:
      narrator_style: >
        confident, slightly irreverent, like a smart friend breaking down
        something wild that happened — match the show's dark humor without
        being edgy for the sake of it
      avoid_phrases:
        - "buckle up"
        - "mind-blowing"
        - "let's dive in"
        - "without further ado"
        - "in this video"
      reference_style: >
        Reference specific episodes by name or description (e.g., "the
        episode where they go to Atlantis") rather than by season/episode
        number — casual viewers won't know S3E7

    # -- Episode data file (for topic mining) --------------------------------
    # Point this to a text/json file containing episode summaries
    episode_data_file: "./clips/ben10/episode_summaries.txt"

    # -- Clips directory -----------------------------------------------------
    clips_dir: "./clips/ben10"

